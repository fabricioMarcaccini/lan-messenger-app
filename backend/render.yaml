services:
  - type: web
    name: lanly-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node migrate_content_types.js && node migrate_file_data.js && node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: "https://app.lanly.com.br"
      - key: PG_HOST
        value: "dpg-d6c68fa4d50c73d53vbg-a.ohio-postgres.render.com"
      - key: PG_PORT
        value: "5432"
      - key: PG_DATABASE
        value: "landb_psr2"
      - key: PG_USER
        value: "landb_psr2_user"
      - key: PG_PASSWORD
        value: "3aqBVNegUSPLUxEKCjtAcVARGNNS4doT"
      - key: MYSQL_HOST
        value: "localhost" # Not strictly required if Supabase fallback is triggered
      - key: REDIS_URL
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: "24h"
      - key: JWT_REFRESH_EXPIRES
        value: "7d"
